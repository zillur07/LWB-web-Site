    <section class="container py-5">
        <div class="row">
            <div class="col-4">
                <h3>Direct Contact</h3>
                <p>Name: John Doe</p>
                <p>Email: john.doe@example.com</p>
                <p>Phone: (123) 456-7890</p>
            </div>
            <div class="col-4">
                <h3>Contuct Us</h3>
                <form id="form" class="row g-3 needs-validation" novalidate>
                    <input type="text" class="form-control" id="validationCustom01" placeholder="Name" required>
                    <input type="email" class="form-control" id="validationCustom02" placeholder="Email" required>
                    <input type="tel" class="form-control" id="validationCustom01" placeholder="phone" required>

                    <textarea name="" id=""></textarea>
                    <button type="submit">Submit</button>
                </form>
                <script>
                    form.addEventListener('submit', event => {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        form.classList.add('was-validated')
                        } else alert('thanks submitted');

                      
                    }, false)
                </script>

            </div>
